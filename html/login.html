<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Lost & Found Portal</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <!-- Navigation -->
  <nav class="navbar">
    <div class="nav-container">
      <div class="logo">
        <span class="logo-icon">🔍</span>
        <span class="logo-text">Lost & Found</span>
      </div>
      <div class="nav-links">
        <a href="index.html" class="nav-link">Home</a>
        <a href="browse.html" class="nav-link">Browse Items</a>
        <a href="register.html" class="btn-primary">Sign Up</a>
      </div>
    </div>
  </nav>

  <!-- Login Form -->
  <div class="form-container">
    <div class="form-header">
      <h1 class="form-title">Welcome Back!</h1>
      <p class="form-subtitle">Login to access your account</p>
    </div>
    
    <form id="loginForm">
      <div class="form-group">
        <label class="form-label" for="email">Email Address</label>
        <input 
          type="email" 
          id="email" 
          class="form-input" 
          placeholder="Enter your email"
          required
        >
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input 
          type="password" 
          id="password" 
          class="form-input" 
          placeholder="Enter your password"
          required
        >
      </div>

      <div class="form-group" style="display: flex; justify-content: space-between; align-items: center;">
        <label class="form-checkbox-label">
          <input type="checkbox" id="remember">
          <span>Remember me</span>
        </label>
        <a href="#" class="form-link">Forgot Password?</a>
      </div>

      <button type="submit" class="form-button btn-primary">
        Login to Account
      </button>
    </form>

    <div class="form-footer">
      Don't have an account? <a href="register.html">Sign up here</a>
    </div>

    <div class="social-divider">
      <span>Or continue with</span>
    </div>

    <div class="social-buttons">
      <button class="btn-social">
        <span>🔍</span> Google
      </button>
      <button class="btn-social">
        <span>📘</span> Facebook
      </button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
